# 公共配置
spring:
  profiles:
    # 默认激活的环境
    active: dev
# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /ecs
  tomcat:
    uri-encoding: UTF-8
    max-threads: 200
    min-spare-threads: 20

# 日志配置
logging:
  level:
    root: INFO
    com.lyrics.ecs: DEBUG  # 改为你的项目包名
    org.springframework.web: INFO
    org.hibernate: ERROR
  file:
    name: logs/${spring.application.name}.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 自定义配置
app:
  version: 1.0.0
  upload:
    path: /data/uploads
    max-size: 10MB
  cors:
    allowed-origins: "*"
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS

# -------------------------- 开发环境配置（关键修改：替换spring.profiles） --------------------------
---
spring:
  config:
    activate:
      on-profile: dev  # 旧写法：spring.profiles: dev → 新写法
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/expense_records?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
#    url: jdbc:mysql://192.168.88.132:3306/expense_records?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
#    password: root

